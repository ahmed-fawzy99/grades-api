# Preview overlay: minimal resources, no autoscaling, dedicated Postgres CR.
# Per-PR values (image.tag, hostnames, namespace) are injected by the ArgoCD
# ApplicationSet (argo/appsets/pr-previews.yaml) via .spec.template helm parameters.

# Shared sealed Secret for all preview namespaces. Sealed with
# `kubeseal --scope cluster-wide` so the same blob decrypts in every
# grades-pr-* namespace. Holds APP_KEY, REDIS_HOST, etc. — DB_HOST and APP_URL
# are templated by the chart per-PR.
sealedSecret:
  enabled: true
  file: preview

namespace:
  create: true
  labels:
    preview: "true"

image:
  repository: ghcr.io/ahmed-fawzy99/grades-api
  tag: pr-placeholder
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-creds

workload:
  replicas: 1
  resources:
    memory: "128Mi"
    maxMemory: "256Mi"
    cpu: "100m"

autoscaling:
  enabled: false

horizon:
  enabled: true
  replicas: 1
  resources:
    memory: "128Mi"
    maxMemory: "256Mi"
    cpu: "100m"

# No scheduler in previews — saves a pod and previews don't need cron.
scheduler:
  enabled: false

postgres:
  dedicated: true
  instances: 1
  storageSize: 500Mi
  version: "17"
  database: grades_db
  owner: postroot

route:
  sectionName: preview
  # ApplicationSet substitutes hostnames[0] with pr-{n}.preview.ahmaddeghady.com
  hostnames:
    - pr-placeholder.preview.ahmaddeghady.com
