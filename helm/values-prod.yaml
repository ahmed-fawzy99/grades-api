# Production overlay (DOKS). Inherits and overrides values.yaml.
# The image.tag line is rewritten by CI (.github/workflows/ci.yml) on every
# push to main, after the image is built and pushed to GHCR.

microservice:
  namespace: grades-prod

image:
  repository: ghcr.io/ahmed-fawzy99/grades-api
  tag: sha-1c1a956
imagePullSecrets:
  - name: ghcr-creds

# Prod env loads APP_KEY, DB_*, REDIS_*, etc. from helm/secrets/prod.sealed.yaml.
# Generate that file with `kubeseal` once — see helm/secrets/README.md.
sealedSecret:
  enabled: true
  file: prod

workload:
  resources:
    memory: "512Mi"
    maxMemory: "1Gi"
    cpu: "250m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilization: 50

horizon:
  enabled: true
  replicas: 1
  resources:
    memory: "256Mi"
    maxMemory: "1Gi"
    cpu: "200m"

scheduler:
  enabled: true
  replicas: 1
  resources:
    memory: "128Mi"
    maxMemory: "256Mi"
    cpu: "100m"

postgres:
  dedicated: true

route:
  sectionName: websecure
  hostnames:
    - grades-api.ahmaddeghady.com
  # Render a sibling HTTPRoute on `web` that 301s every HTTP request to HTTPS.
  # Previously the Traefik chart did this at the entrypoint level — moved to
  # the route so local dev can keep using the `web` listener.
  enforceHttps: true
