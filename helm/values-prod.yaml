# Production overlay (DOKS). Inherits and overrides values.yaml.
# The image.tag line is rewritten by CI (.github/workflows/ci.yml) on every
# push to main, after the image is built and pushed to GHCR.

microservice:
  namespace: grades-prod

image:
  repository: ghcr.io/ahmaddeghady/grades-api
  tag: sha-3ef6de4

imagePullSecrets:
  - name: ghcr-creds

# Prod env loads APP_KEY, DB_*, REDIS_*, etc. from helm/secrets/prod.sealed.yaml.
# Generate that file with `kubeseal` once — see helm/secrets/README.md.
sealedSecret:
  enabled: true
  file: prod

workload:
  resources:
    memory: "512Mi"
    maxMemory: "1Gi"
    cpu: "250m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilization: 50

horizon:
  enabled: true
  replicas: 1
  resources:
    memory: "256Mi"
    maxMemory: "1Gi"
    cpu: "200m"

scheduler:
  enabled: true
  replicas: 1
  resources:
    memory: "128Mi"
    maxMemory: "256Mi"
    cpu: "100m"

postgres:
  dedicated: false

route:
  sectionName: websecure
  hostnames:
    - grades-api.ahmaddeghady.com
