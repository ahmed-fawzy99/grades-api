{{- /*
  SealedSecret loader.

  When .Values.sealedSecret.enabled is true, this template inlines the
  encrypted YAML produced by `kubeseal`. The file path is:
      helm/secrets/{{ .Values.sealedSecret.file }}.sealed.yaml

  The sealed-secrets controller (installed by argo/apps/infra/00-sealed-secrets.yaml)
  watches the SealedSecret CR and materializes a plain Secret with the same
  name in the same namespace. The Deployments load that Secret via envFrom.

  Generate the sealed file with (one-time per env):
      kubectl create secret generic grades-api-secrets \
        --from-env-file=.env.prod \
        --namespace=grades-prod \
        --dry-run=client -o yaml \
        | kubeseal \
            --controller-namespace=sealed-secrets \
            --controller-name=sealed-secrets \
            --format=yaml \
        > helm/secrets/prod.sealed.yaml
*/}}
{{- if .Values.sealedSecret.enabled -}}
{{- $path := printf "secrets/%s.sealed.yaml" .Values.sealedSecret.file -}}
{{- $blob := .Files.Get $path -}}
{{- if not $blob -}}
{{- fail (printf "sealedSecret.enabled=true but %q is missing or empty. Run kubeseal to generate it (see helm/secrets/README.md)." $path) -}}
{{- end }}
{{ $blob }}
{{- end }}
