apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.microservice.name }}-route
  namespace: {{ .Values.microservice.namespace }}
  labels:
    {{- include "grades-api.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.route.parentName }}
      namespace: {{ .Values.route.parentNamespace }}
      sectionName: {{ .Values.route.sectionName }}
  {{- with .Values.route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.microservice.name }}
          port: {{ .Values.workload.port }}
